# /srv/infra/nginx/conf.d/acuventech-subdomains.conf
#
# crm.acuventech.com  — 直接反代 CRM 容器（crm_os-frontend-1 / crm_os-backend-1）
# erp.acuventech.com  — 直接反代 ERP 容器（erp_frontend / erp_backend）
#
# SSL 证书：同 acuventech.com，使用 origin.crt / origin.key（Cloudflare Origin 证书）
# 前提：Cloudflare SSL/TLS 模式设置为 "Full"（不是 Full Strict），
#       否则需要为 *.acuventech.com 单独申请一张 Cloudflare Origin 证书。
#
# DNS（Cloudflare）：
#   crm.acuventech.com  A  103.40.204.95  ✅ Proxy（橙色云）
#   erp.acuventech.com  A  103.40.204.95  ✅ Proxy（橙色云）

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name crm.acuventech.com erp.acuventech.com;
    return 301 https://$host$request_uri;
}

# ── crm.acuventech.com ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name crm.acuventech.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    set $crm_backend  "crm_os-backend-1:8000";
    set $crm_frontend "crm_os-frontend-1:80";

    # Backend API
    location /api/ {
        proxy_pass http://$crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # WhatsApp webhook
    location /api/webhooks/ {
        proxy_pass http://$crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Frontend SPA
    location / {
        proxy_pass http://$crm_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ── erp.acuventech.com ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name erp.acuventech.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25M;

    set $erp_backend  "erp_backend:8000";
    set $erp_frontend "erp_frontend:80";

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check
    location = /health {
        access_log off;
        proxy_pass http://$erp_backend/health;
        proxy_set_header Host $host;
    }

    # API
    location /api/ {
        proxy_pass http://$erp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # OpenAPI docs
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://$erp_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Frontend SPA
    location / {
        proxy_pass http://$erp_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
