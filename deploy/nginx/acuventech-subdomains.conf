# /srv/infra/nginx/conf.d/acuventech-subdomains.conf
#
# crm.acuventech.com  →  crm.kelvinpeng.com  (301)
# erp.acuventech.com  →  erp.kelvinpeng.com  (301)
#
# These are demo systems hosted under kelvinpeng.com subdomains.
# Users accessing acuventech subdomain are transparently redirected.

# ── HTTP: redirect all to HTTPS first ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name crm.acuventech.com erp.acuventech.com;
    return 301 https://$host$request_uri;
}

# ── crm.acuventech.com → crm.kelvinpeng.com ───────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name crm.acuventech.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://crm.kelvinpeng.com$request_uri;
}

# ── erp.acuventech.com → erp.kelvinpeng.com ───────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name erp.acuventech.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://erp.kelvinpeng.com$request_uri;
}
