# /srv/infra/nginx/conf.d/acuventech.com.conf
#
# Static company landing page.
# Build artifact (just index.html + public/*) lives under /srv/sites/acuventech.com.
# Deployed by GitHub Actions via rsync.
#
# ▶▶ BEFORE USE: replace `acuventech.com` with the real domain everywhere below.
#                replace `origin.crt`/`origin.key` if the cert filename differs.

# Redirect HTTP → HTTPS (apex + www)
server {
    listen 80;
    listen [::]:80;
    server_name acuventech.com www.acuventech.com;
    return 301 https://acuventech.com$request_uri;
}

# Redirect www → apex
server {
    listen 443 ssl;
    http2 on;
    server_name www.acuventech.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://acuventech.com$request_uri;
}

# Main site
server {
    listen 443 ssl;
    http2 on;
    server_name acuventech.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /srv/sites/acuventech.com;
    index index.html;

    # Security headers
    add_header X-Frame-Options              "SAMEORIGIN"           always;
    add_header X-Content-Type-Options       "nosniff"              always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;

    # Static assets (favicons, og images, css, js) — 1 day
    location ~* \.(?:jpg|jpeg|gif|png|webp|svg|ico|woff2?|css|js)$ {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # HTML — never cached so deploys are visible immediately
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
